<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeartRateLoader Test</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #000;
      font-family: Arial, sans-serif;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    h1 {
      color: #29F2DF;
      text-align: center;
      margin-bottom: 40px;
    }
    
    .loader-wrapper {
      margin: 40px 0;
      padding: 40px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(41, 242, 223, 0.3);
      border-radius: 8px;
    }
    
    .loader-title {
      color: #fff;
      margin-bottom: 20px;
      font-size: 18px;
    }
    
    .loader {
      --dasharray: 814;
      position: relative;
      width: 100%;
      max-width: 550px;
      height: 210px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    .loader svg {
      position: absolute;
      width: 100%;
      max-width: 550px;
      height: auto;
    }

    .loader svg path {
      stroke-dasharray: var(--dasharray);
      animation: heartRateLoaderAnim 5s infinite linear forwards;
    }

    @keyframes heartRateLoaderAnim {
      from {
        stroke-dashoffset: var(--dasharray);
      }
      to {
        stroke-dashoffset: calc(var(--dasharray) * -1);
      }
    }
    
    .loader-small {
      max-width: 400px;
      height: 150px;
    }
    
    .loader-tiny {
      max-width: 300px;
      height: 120px;
    }
  </style>
</head>
