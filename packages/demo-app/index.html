<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RHUDS - Reactive HUD UI Design System</title>
    <!-- Professional Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&family=Audiowide&family=Michroma&family=Electrolize&family=Rajdhani:wght@400;500;600;700&family=Oxanium:wght@400;600;700;800&family=Rubik+Mono+One&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        overflow-x: visible;
        width: 100%;
      }
      #root {
        max-width: 100vw;
        overflow-x: hidden;
      }

      #scanlines {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: 100vh;
        background: repeating-linear-gradient(
          0deg,
          rgba(255, 255, 0, 0.03) 0px,
          rgba(255, 255, 0, 0.03) 1px,
          transparent 1px,
          transparent 2px
        );
        pointer-events: none;
        z-index: 9998;
        animation: scanlines 8s linear infinite;
      }

      @keyframes scanlines {
        0% {
          background-position: 0 0;
        }
        100% {
          background-position: 0 10px;
        }
      }

      /* Support for backdrop-filter */
      @supports (backdrop-filter: blur(1px)) {
        .neon-glass {
          backdrop-filter: blur(20px);
        }
      }

      @supports (-webkit-backdrop-filter: blur(1px)) {
        .neon-glass {
          -webkit-backdrop-filter: blur(20px);
        }
      }
    </style>
  </head>
  <body>
    <div id="scanlines"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
